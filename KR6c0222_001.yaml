body:
  text: 西天譯經三藏朝散大夫試鴻臚卿傳法大師臣施護奉詔譯如是我聞一時佛在王舍城鷲峯山中有無數大苾芻衆復十俱胝童子相菩薩摩訶薩爾時世尊告帝釋天主憍尸迦此般若波羅蜜其義甚深非一非異非相非無相非取非捨非增非損非有煩惱非無煩惱非捨非不捨非住非不住非相應非不相應非煩惱非不煩惱非緣非不緣非實非不實非法非不法非有所歸非無所歸非實際非不實際憍尸迦如是一切法平等般若波羅蜜亦平等一切法寂靜般若波羅蜜亦寂靜一切法不動般若波羅蜜亦不動一切法分別般若波羅蜜亦分別一切法怖畏般若波羅蜜亦怖畏一切法了知般若波羅蜜亦了知一切法一味般若波羅蜜亦一味一切法不生般若波羅蜜亦不生一切法不滅般若波羅蜜亦不滅一切法虛空妄想般若波羅蜜亦虛空妄想色無邊般若波羅蜜亦無邊如是受想行識無邊般若波羅蜜亦無邊地界無邊般若波羅蜜亦無邊如是水界火界風界空界識界無邊般若波羅蜜亦無邊金剛平等般若波羅蜜亦平等一切法不壞般若波羅蜜亦不壞一切法性不可得般若波羅蜜亦不可得一切法性平等般若波羅蜜亦平等一切法無性般若波羅蜜亦無性一切法不思議般若波羅蜜亦不思議如是布施波羅蜜持戒波羅蜜忍辱波羅蜜精進波羅蜜禪定波羅蜜方便波羅蜜願波羅蜜力波羅蜜智波羅蜜亦不可思議三業清淨般若波羅蜜亦清淨如是般若波羅蜜其義無邊復次憍尸迦所有十八空何等十八空內空外空內外空空空大空勝義空有為空無為空無際空無變異空無始空本性空自相空無相空無性空自性空無性自性空一切法空頌曰如星如燈翳夢幻及泡露如電亦如雲應作如是觀我今略説此般若波羅蜜不生亦不滅不斷亦不常非一非多義非來亦非去如是十二緣止息令寂靜正等正覺説恭信最上師歸依十方佛過現及未來三寶波羅蜜無量功德海供養諸如來大明真祕密真言曰怛儞也二合他引鉢囉二合倪鉢囉二合倪摩賀引鉢囉二合倪鉢囉二合倪嚩婆引細鉢囉二合倪魯迦迦哩引阿倪也二合曩尾馱摩儞去悉提引蘇悉提悉𠆙切身覩𤚥婆誐嚩帝薩哩鑁二合引誐遜那哩去跋訖帝二合晚娑隸引鉢囉二合娑引哩多賀悉帝二合引三摩引娑嚩二合娑迦哩悉𠆙切身悉𠆙切身沒𠆙沒𠆙劍波劍波左攞左攞囉引嚩囉引嚩阿引誐蹉阿引誐蹉婆誐嚩帝摩引尾攞莎娑嚩二合引賀引曩謨達哩謨二合捺誐二合多寫冒地薩埵寫摩賀引薩埵寫摩賀引迦嚕尼迦寫曩謨娑那引鉢囉二合嚕禰怛寫冒地薩埵寫摩賀引薩埵寫摩賀引迦嚕尼迦寫曩謨入鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他牟儞達哩彌二合引僧誐囉二合賀達哩彌二合阿努誐囉二合賀達哩彌二合尾目訖多二合達哩彌二合薩埵引努誐囉二合賀達哩彌二合吠室囉二合嚩拏達哩彌二合三滿多引努波哩嚩哩多二合曩達哩彌二合引虞拏誐囉二合賀僧誐囉二合賀達哩彌二合引薩哩嚩二合怛囉二合引努誐多達哩彌二合引薩哩嚩二合迦引羅波哩鉢囉二合引波拏達哩彌二合引娑嚩二合引賀引鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他引阿佉儞曩佉儞阿佉曩儞佉儞阿嚩羅晚馱儞半那儞半那儞鉢捺哩娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他引昂誐引昂誐引曩帝囉引昂誐引曩帝曩引嚩婆引娑昂誐引娑嚩二合引賀曩謨鉢囉二合倪也二合波引囉彌多引曳怛儞也二合他引室哩二合曳引室哩二合曳引牟儞室哩二合曳引牟儞室哩二合野細娑嚩二合引賀引鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他唵引嚩𭍒二合未隸引娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉禰多引曳引怛儞也二合他引唵紇凌二合室凌二合特凌二合室嚕二合帝特哩二合帝娑蜜哩二合誐帝尾曳引惹娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉彌多引曳怛儞也二合他引鑁嚩哩鑁嚩哩摩賀引鑁嚩哩度嚕度嚕摩賀引度嚕娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他引虎帝虎帝虎多引設儞薩哩嚩二合迦哩摩二合嚩囉拏儞娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉彌多引曳引怛儞也二合他引唵引阿嚕黎迦娑嚩二合引賀引曩謨鉢囉倪也二合波引囉彌多引曳引怛儞也二合他引唵引薩哩嚩二合尾覩入聲娑嚩二合引賀引曩謨鉢囉二合倪也二合波引囉彌多引曳怛儞也二合他引誐帝誐帝波引囕誐帝波引囉僧誐帝冒地娑嚩二合引賀爾時世尊説此經已帝釋天主及諸菩薩摩訶薩天人乾闥婆阿修羅等一切大衆聞佛所説皆大歡喜信受奉行
